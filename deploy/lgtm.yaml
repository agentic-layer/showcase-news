apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: monitoring
spec:
  selector:
    app: lgtm
  ports:
    - name: grafana
      protocol: TCP
      port: 3000
      targetPort: 3000
    - name: otel-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otel-http
      protocol: TCP
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lgtm
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lgtm-sidecar
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lgtm-sidecar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lgtm-sidecar
subjects:
  - kind: ServiceAccount
    name: lgtm
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  sidecar.yaml: |
    apiVersion: 1
    providers:
      - name: 'sidecar-provider'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          # Point this to the root of the volume mount
          path: /var/lib/grafana/dashboards/sidecar
          foldersFromFilesStructure: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yaml: |
    global:
      scrape_native_histograms: true
    otlp:
      keep_identifying_resource_attributes: true
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - container.name
        - deployment.environment
        - deployment.environment.name
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - host.name
    storage:
      tsdb:
        out_of_order_time_window: 10m
    scrape_configs:
      - job_name: 'ai-gateway'
        scrape_interval: 15s
        static_configs:
          - targets: ['ai-gateway.ai-gateway.svc.cluster.local:80']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo-config.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9096

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "127.0.0.1:4417"
            http:
              endpoint: "127.0.0.1:4418"
      # Do not limit attribute length, so full llm requests/responses are kept in spans
      max_attribute_bytes: 0

    ingester:
      trace_idle_period: 1s
      max_block_duration: 1s
      flush_check_period: 1s
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        min_ready_duration: 1s

    memberlist:
      bind_addr: [127.0.0.1]
      bind_port: 7947

    querier:
      frontend_worker:
        frontend_address: 127.0.0.1:9096

    storage:
      trace:
        backend: local
        wal:
          path: /data/tempo/wal
        local:
          path: /data/tempo/blocks

    metrics_generator:
      processor:
        local_blocks:
          filter_server_spans: false
        span_metrics:
          dimensions:
            - service_name
            - operation
            - status_code
      traces_storage:
        path: /data/tempo/generator/traces
      storage:
        path: /data/tempo/generator/wal
        remote_write:
          - url: http://127.0.0.1:9090/api/v1/write
            send_exemplars: true

    overrides:
      metrics_generator_processors: [service-graphs, local-blocks, span-metrics]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      serviceAccountName: lgtm
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:0.24.0
          ports:
            - containerPort: 3000
            - containerPort: 4317
            - containerPort: 4318
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              memory: 2Gi
              ephemeral-storage: 5Gi
          readinessProbe:
            exec:
              command:
                - "/otel-lgtm/docker/healthcheck.sh"
          env:
            # Use observability-dashboard, if deployed (lgtm will silently ignore it otherwise)
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://observability-dashboard.observability-dashboard.svc.cluster.local:8000/v1/traces"
            # Enable logs on-demand (disabled by default to avoid log pollution)
            - name: ENABLE_LOGS_TEMPO
              value: "false"
            - name: ENABLE_LOGS_LOKI
              value: "false"
            - name: ENABLE_LOGS_OTELCOL
              value: "false"
            - name: ENABLE_LOGS_PROMETHEUS
              value: "false"
          volumeMounts:
            - name: tempo-data
              mountPath: /data/tempo
            - name: grafana-data
              mountPath: /data/grafana
            - name: loki-data
              mountPath: /data/loki
            - name: loki-storage
              mountPath: /loki
            - name: p8s-storage
              mountPath: /data/prometheus
            - name: pyroscope-storage
              mountPath: /data/pyroscope
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards/sidecar
            - name: grafana-dashboard-provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/sidecar.yaml
              subPath: sidecar.yaml
            - name: prometheus-config
              mountPath: /otel-lgtm/prometheus.yaml
              subPath: prometheus.yaml
            - name: tempo-config
              mountPath: /otel-lgtm/tempo-config.yaml
              subPath: tempo-config.yaml
        - name: dashboard-sidecar
          image: kiwigrid/k8s-sidecar:1.28.0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              memory: 128Mi
              ephemeral-storage: 256Mi
          env:
            - name: LABEL
              value: "grafana_dashboard"
            - name: LABEL_VALUE
              value: "1"
            - name: FOLDER
              value: /var/lib/grafana/dashboards/sidecar
            - name: NAMESPACE
              value: ALL
            - name: RESOURCE
              value: configmap
          volumeMounts:
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards/sidecar
      volumes:
        - name: tempo-data
          emptyDir: {}
        - name: loki-data
          emptyDir: {}
        - name: grafana-data
          emptyDir: {}
        - name: loki-storage
          emptyDir: {}
        - name: p8s-storage
          emptyDir: {}
        - name: pyroscope-storage
          emptyDir: {}
        - name: grafana-dashboards
          emptyDir: {}
        - name: grafana-dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
            optional: true
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: tempo-config
          configMap:
            name: tempo-config
