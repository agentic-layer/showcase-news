apiVersion: tests.testkube.io/v1
kind: TestTrigger
metadata:
  name: news-agent-test-workflow-trigger
  namespace: testkube
spec:
  resource: deployment
  resourceSelector:
    name: news-agent
    namespace: showcase-news
  event: modified
  action: run
  execution: testworkflow
  concurrencyPolicy: allow
  testSelector:
    name: news-agent-test-workflow
    namespace: testkube
  disabled: false