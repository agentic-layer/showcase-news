apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: news-agent-test-workflow
  namespace: testkube
  labels:
    testkube.io/test-category: ragas-evaluation
    app: testworkflows

spec:
  content:
    files:
      - path: /data/datasets/experiment.json
        contentFrom:
          configMapKeyRef:
            name: experiment
            key: experiment.json

  container:
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        valueFrom:
          configMapKeyRef:
            name: otel-testbench-config
            key: OTEL_EXPORTER_OTLP_ENDPOINT

  use:
  - name: run-template
    config:
      agentUrl: "http://news-agent.showcase-news:8000"
  - name: evaluate-template
    config:
      openApiBasePath: "http://ai-gateway.ai-gateway:4000"
  - name: publish-template
  - name: visualize-template