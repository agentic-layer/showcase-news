apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: news-fetcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showcase-news.labels" . | nindent 4 }}
spec:
  protocol: mcp
  transportType: http
  image: {{ .Values.images.newsFetcher.repository }}:{{ .Values.images.newsFetcher.tag }}
  port: 8000
  replicas: 1
  env:
    - name: OTEL_SERVICE_NAME
      value: news-fetcher
  {{- with .Values.extraEnv }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolRoute
metadata:
  name: news-fetcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showcase-news.labels" . | nindent 4 }}
spec:
  {{- with .Values.toolGateway.ref }}
  toolGatewayRef:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  upstream:
    toolServerRef:
      name: news-fetcher
