# Default values for showcase-news
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: showcase-news

images:
  # News fetcher MCP server image
  newsFetcher:
    repository: ghcr.io/agentic-layer/showcase-news-news-fetcher
    tag: latest

config:
  # Log level for agents (DEBUG, INFO, WARNING, ERROR)
  logLevel: DEBUG

  # Enable OpenTelemetry tracing
  otelEnabled: true

  # Capture HTTP bodies in OpenTelemetry traces
  otelCaptureHttpBodies: true

# Tool Gateway reference used by ToolRoute resources to expose tool servers.
# Leave ref empty to let the tool-gateway operator resolve the default ToolGateway
# (a ToolGateway in the well-known "tool-gateway" namespace).
# Override to pin to a specific ToolGateway, e.g.:
#   ref:
#     name: tool-gateway
#     namespace: tool-gateway
toolGateway:
  ref: {}

# Extra environment variables applied to all agents and tool servers
# Example:
#  - name: OTEL_EXPORTER_OTLP_PROTOCOL
#    value: "http/protobuf"
#  - name: OTEL_EXPORTER_OTLP_ENDPOINT
#    value: "http://lgtm.monitoring.svc.cluster.local:4318"
extraEnv: []
